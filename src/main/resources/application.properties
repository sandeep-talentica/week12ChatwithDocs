spring.docker.compose.enabled=false
spring.application.name=week12ChatwithDocs
spring.ai.openai.api-key=${OPENAI_API_KEY:demo}
spring.ai.openai.embedding.options.model=text-embedding-3-small
#spring.ai.ollama.chat.options.model=llama3.2:1b
#spring.ai.ollama.base-url=http://localhost:11434
# 1. Database Connection (Matches your Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret

# 2. Vector Store Setup
spring.ai.vectorstore.pgvector.initialize-schema=true

# 3. Model Dimensions (Crucial!)
# If using OpenAI text-embedding-3-small, set to 1536
# If using Ollama/nomic-embed-text, set to 768
spring.ai.vectorstore.pgvector.dimensions=1536

# 4. File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 5. Document Processing Configuration
document.processing.chunk-size=128
document.processing.chunk-overlap=100

# 6. RAG Configuration
rag.top-k=5
rag.similarity-threshold=0.7
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
app.cors.allowed-origins=http://localhost:8080,http://localhost:63342
